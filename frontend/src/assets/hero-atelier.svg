<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1125" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Warm atelier interior composition">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#f7f2ea"/>
      <stop offset="0.55" stop-color="#efe6d7"/>
      <stop offset="1" stop-color="#e3d4bd"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcc8aa"/>
      <stop offset="1" stop-color="#c9ad84"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#fbf3df" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbf3df" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b98a4e"/>
      <stop offset="1" stop-color="#8b5722"/>
    </linearGradient>
    <linearGradient id="chair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a5365"/>
      <stop offset="1" stop-color="#2e3543"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Base wall + floor -->
  <rect width="1800" height="1125" fill="url(#sky)"/>
  <rect y="760" width="1800" height="365" fill="url(#floor)"/>
  <ellipse cx="1260" cy="360" rx="720" ry="520" fill="url(#glow)"/>

  <!-- Soft window light panel -->
  <g opacity="0.5">
    <rect x="1180" y="120" width="360" height="520" rx="14" fill="#fffaf0"/>
    <line x1="1360" y1="120" x2="1360" y2="640" stroke="#e6d6bb" stroke-width="6"/>
    <line x1="1180" y1="380" x2="1540" y2="380" stroke="#e6d6bb" stroke-width="6"/>
  </g>

  <!-- Floor contact shadows -->
  <ellipse cx="600" cy="900" rx="300" ry="40" fill="#7c6748" opacity="0.28" filter="url(#soft)"/>
  <ellipse cx="1250" cy="930" rx="220" ry="34" fill="#7c6748" opacity="0.26" filter="url(#soft)"/>

  <!-- Lounge chair silhouette -->
  <g>
    <path d="M360 880 Q345 690 470 660 L780 660 Q900 670 905 800 L905 880 Z" fill="url(#chair)"/>
    <path d="M470 660 Q450 560 560 540 L760 540 Q820 545 800 660 Z" fill="#3a414f"/>
    <rect x="400" y="860" width="34" height="70" rx="8" fill="#272d39"/>
    <rect x="840" y="860" width="34" height="70" rx="8" fill="#272d39"/>
  </g>

  <!-- Side table + sculptural vase -->
  <g>
    <rect x="1120" y="700" width="260" height="22" rx="11" fill="#8b6a3f"/>
    <rect x="1150" y="722" width="18" height="200" fill="#6f5230"/>
    <rect x="1332" y="722" width="18" height="200" fill="#6f5230"/>
    <path d="M1210 700 Q1180 560 1250 500 Q1320 560 1290 700 Z" fill="url(#vase)"/>
    <path d="M1235 500 Q1250 430 1265 500 Z" fill="#9a7b46"/>
    <circle cx="1250" cy="495" r="10" fill="#c8932f"/>
  </g>

  <!-- Pendant light -->
  <g>
    <line x1="900" y1="0" x2="900" y2="210" stroke="#bfa977" stroke-width="4"/>
    <path d="M840 210 Q900 130 960 210 Q960 280 900 290 Q840 280 840 210 Z" fill="#d4a843"/>
    <ellipse cx="900" cy="295" rx="58" ry="14" fill="#fbf3df"/>
  </g>

  <!-- Subtle gold accent lines -->
  <g stroke="#c8932f" stroke-width="2" opacity="0.35" fill="none">
    <path d="M120 1020 H1680"/>
    <path d="M120 240 Q480 200 900 220"/>
  </g>
</svg>
