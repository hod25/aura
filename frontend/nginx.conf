server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # Compiled SPA assets.
    root   /usr/share/nginx/html;
    index  index.html;

    # Harden response headers (OWASP A05 — Security Misconfiguration).
    server_tokens off;
    add_header X-Frame-Options          "SAMEORIGIN"        always;
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"     always;

    # Gzip text assets for faster first paint.
    gzip               on;
    gzip_vary          on;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_types         text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # Long-lived caching for fingerprinted static assets.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Never cache the HTML shell so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # React Router (BrowserRouter) — fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight container health endpoint.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    error_page 500 502 503 504 /index.html;
}
